{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-5">
        <div class="card shadow border-0 rounded-4">
            <div class="card-body p-5">
                <div class="text-center mb-4">
                    <i class="bi bi-envelope-check-fill fs-1 text-primary mb-2"></i>
                    <h3 class="fw-bold">Quên Mật Khẩu</h3>
                    <p class="text-muted small">Nhập email của bạn để nhận liên kết khôi phục.</p>
                </div>
                <form action="{{ url_for('auth.forgot_password') }}" method="POST">
                    <div class="mb-4">
                        <label class="form-label text-muted fw-bold">Email</label>
                        <input type="email" name="email" class="form-control form-control-lg rounded-3" placeholder="Nhập email bạn đã đăng ký" required>
                    </div>
                    <button type="submit" class="btn btn-primary btn-lg w-100 mb-3 rounded-pill fw-bold">Gửi Link Khôi Phục</button>
                    <div class="text-center mt-3">
                        <small class="text-muted"><a href="{{ url_for('auth.login') }}" class="text-decoration-none fw-bold text-primary">Quay lại Đăng nhập</a></small>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
