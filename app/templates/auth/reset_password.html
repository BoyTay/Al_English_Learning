{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-5">
        <div class="card shadow border-0 rounded-4">
            <div class="card-body p-5">
                <div class="text-center mb-4">
                    <i class="bi bi-shield-lock-fill fs-1 text-primary mb-2"></i>
                    <h3 class="fw-bold">Đặt Lại Mật Khẩu</h3>
                    <p class="text-muted small">Nhập mật khẩu mới của bạn bên dưới.</p>
                </div>
                <form action="{{ url_for('auth.reset_password', token=token) }}" method="POST">
                    <div class="mb-3">
                        <label class="form-label text-muted fw-bold">Mật khẩu mới (tối thiểu 8 ký tự)</label>
                        <input type="password" name="password" class="form-control form-control-lg rounded-3" minlength="8" required>
                    </div>
                    <div class="mb-4">
                        <label class="form-label text-muted fw-bold">Xác nhận mật khẩu mới</label>
                        <input type="password" name="password_confirm" class="form-control form-control-lg rounded-3" minlength="8" required>
                    </div>
                    <button type="submit" class="btn btn-primary btn-lg w-100 mb-3 rounded-pill fw-bold">Đổi Mật Khẩu</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
